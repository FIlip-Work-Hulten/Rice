<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Minesweeper</title>
        <link rel="stylesheet" href="/static/css/style.css?v=3">
        <link rel="stylesheet" href="/static/css/components/navbar.css?v=3">
        <link rel="stylesheet" href="/static/css/components/buttons.css?v=3">
        <link rel="icon" type="image/png" href="/static/img/Icon.png">
        <link rel="icon" type="image/png" href="/static/img/ratcave.png">
    </head>
    <body class="body">
        <script src="/static/js/routing.js?v=3"></script>
        <script src="/static/js/i18n.js?v=3"></script>
        <script src="/static/js/navbar.js?v=3"></script>

        <div id="navbar-root"></div>
        <div class="wrapper">
            <h1>Minesweeper</h1>
            <div class="ms-controls">
                <label for="ms-level">Level:</label>
                <select id="ms-level">
                    <option value="beginner">Beginner (9x9, 10)</option>
                    <option value="intermediate">Intermediate (16x16, 40)</option>
                    <option value="expert">Expert (16x30, 99)</option>
                </select>
                <button id="ms-new">New Game</button>
                <div style="display:flex;gap:12px;align-items:center;margin-left:8px">
                  <div id="ms-mines" class="ms-info">Mines: —</div>
                  <div id="ms-timer" class="ms-info">Time: 0s</div>
                </div>
                <span id="ms-status" class="ms-info"></span>
            </div>

                        <div id="ms-container" class="ms-wrapper beginner">
                            <div id="minesweeper-root"></div>
                        </div>
        </div>

        <script src="/static/js/minesweeper.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function(){ if(typeof i18nInit==='function') i18nInit(); });
        </script>
    </body>
</html>
