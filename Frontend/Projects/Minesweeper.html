<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Minesweeper</title>
        <link rel="stylesheet" href="../CSS/style.css">
        <link rel="icon" type="image/png" href="../img/Icon.png">
        <style>
        .ms-controls{margin:16px 0}
        .ms-grid{display:grid;gap:2px;background:#444;padding:6px;max-width:90vw}
        .ms-cell{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:#bbb;border:none;font-weight:600;cursor:pointer}
        .ms-cell.revealed{background:#e8e8e8;cursor:default}
        .ms-cell.flagged{background:#ffdede}
        .ms-info{margin:8px 0}
        </style>
    </head>
    <body class="body">
        <div id="navbar-root"></div>
        <script src="../JS/routing.js"></script>
        <script src="../JS/i18n.js"></script>
        <script src="../JS/navbar.js"></script>

        <div class="wrapper">
            <h1>Minesweeper</h1>
            <div class="ms-controls">
                <label for="ms-level">Level:</label>
                <select id="ms-level">
                    <option value="beginner">Beginner (9x9, 10)</option>
                    <option value="intermediate">Intermediate (16x16, 40)</option>
                    <option value="expert">Expert (16x30, 99)</option>
                </select>
                <button id="ms-new">New Game</button>
                <div style="display:flex;gap:12px;align-items:center;margin-left:8px">
                  <div id="ms-mines" class="ms-info">Mines: —</div>
                  <div id="ms-timer" class="ms-info">Time: 0s</div>
                </div>
                <span id="ms-status" class="ms-info"></span>
            </div>

                        <div id="ms-container" class="ms-wrapper beginner">
                            <div id="minesweeper-root"></div>
                        </div>
        </div>

        <script src="../JS/minesweeper.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function(){ if(typeof i18nInit==='function') i18nInit(); });
        </script>
    </body>
</html>
